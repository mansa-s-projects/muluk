<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Paper Red Rectangle</title>
    <style>
      html, body {
        margin: 0;
        height: 100%;
        background: #f5f5f5;
      }
      canvas[resize] {
        width: 100%;
        height: 100%;
      }
    </style>
    <script src="https://unpkg.com/paper@0.12.17/dist/paper-full.min.js"></script>
  </head>
  <body>
    <canvas id="paper-canvas" resize></canvas>
    <script>
      paper.setup(document.getElementById("paper-canvas"));

      var rect = new paper.Path.Rectangle({
        point: [100, 100],
        size: [240, 140],
        fillColor: "red"
      });

      paper.view.draw();
    </script>
  </body>
</html>
